{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Job - Smart Campus Placement System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --sams-navy: #004080;   
            --sams-green: #004d26;  
            --sams-red: #c00000;    
            --overlay-white: rgba(255, 255, 255, 0.96);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: url("{% static 'images/back2.jpg' %}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* --- HEADER & NAV (Recruiter Style) --- */
        .header-top {
            width: 100%;
            background: #ffffff;
            padding: 12px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 5px solid var(--sams-green);
        }

        .logo-main { display: flex; align-items: center; gap: 15px; }
        .logo-main img { height: 60px; }
        .college-name h1 { color: var(--sams-red); font-size: 20px; font-weight: 800; line-height: 1; }
        .college-name p { font-size: 10px; color: var(--sams-navy); font-weight: bold; }

        nav { background: var(--sams-navy); padding: 0 40px; position: sticky; top: 0; z-index: 1000; }
        .menu_nav ul { display: flex; list-style: none; justify-content: center; }
        .menu_nav ul li a { 
            text-decoration: none; color: white; font-size: 12px; font-weight: 600; 
            padding: 15px 20px; display: block; transition: 0.3s; 
        }
        .menu_nav ul li a:hover { background: rgba(255, 255, 255, 0.1); color: #ffcc00; }

        /* --- FORM CONTAINER --- */
        .container {
            max-width: 850px;
            margin: 40px auto;
            background: var(--overlay-white);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
            border-top: 6px solid var(--sams-navy);
            padding-bottom: 20px;
        }

        .form-header {
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        form { padding: 30px 40px; }
        
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group { margin-bottom: 20px; }
        .full-width { grid-column: span 2; }

        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--sams-navy); font-size: 14px; }
        
        input[type="text"], input[type="date"], textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: 0.3s;
        }

        textarea { height: 100px; resize: vertical; }
        input:focus, textarea:focus, select:focus { border-color: var(--sams-navy); outline: none; }

        .btn-submit {
            background: var(--sams-navy);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .btn-submit:hover { background: var(--sams-red); }
        .msg-display { text-align: center; color: var(--sams-red); font-weight: 600; margin-bottom: 15px; }

    </style>

    <script>
        function validate(formObj) {
            if(!formObj.t1.value.trim()) { alert("Please Enter job description"); formObj.t1.focus(); return false; }
            if(!formObj.t2.value.trim()) { alert("Please Enter salary"); formObj.t2.focus(); return false; }
            if(!formObj.t3.value) { alert("Please choose last date"); formObj.t3.focus(); return false; }
            return true;
        }
    </script>
</head>
<body>

    <header class="header-top">
        <div class="logo-main">
            <img src="{% static 'images/logo.jpg' %}" alt="Logo">
            <div class="college-name">
                <h1>SAMSKRUTI</h1>
                <p>RECRUITER PORTAL</p>
            </div>
        </div>
        <div style="font-size: 12px; font-weight: 600; color: var(--sams-navy);">Post New Opportunity</div>
    </header>

    <nav>
        <div class="menu_nav">
            <ul>
                <li><a href="{% url 'PostJob' %}" style="border-bottom: 3px solid #ffcc00;">Post Jobs</a></li>
                <li><a href="{% url 'AddQuestion' %}">Add Test Question</a></li>
                <li><a href="{% url 'ViewPerformance' %}">View Performance</a></li>
                <li><a href="{% url 'index' %}" style="background: var(--sams-red); margin-left: 15px;">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="container animate__animated animate__fadeInUp">
        <div class="form-header">
            <h2 style="color: var(--sams-navy);">Job Posting Form</h2>
            <p style="font-size: 13px; color: #666;">Provide details to announce a new recruitment drive</p>
        </div>

        <form name="f1" method="post" action="{% url 'PostJobAction' %}" onsubmit="return validate(this);">
            {% csrf_token %}
            
            <div class="msg-display">{{ data|safe }}</div>

            <div class="form-group">
                <label>Job Description</label>
                <textarea name="t1" placeholder="Describe the role, responsibilities, and company details..."></textarea>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label>Salary Package (LPA)</label>
                    <input type="text" name="t2" placeholder="e.g. 6.5 LPA">
                </div>

                <div class="form-group">
                    <label>Last Application Date</label>
                    <input name="t3" type="date">
                </div>
            </div>

            <div class="form-group">
                <label>Required Skills (Select multiple)</label>
                <select name="t4" multiple style="height: 150px;">
                    <option value="C">C Programming</option>
                    <option value="Java">Java</option>
                    <option value="Python">Python</option>
                    <option value="Database">Database Management</option>
                    <option value="Web Technologies">Web Technologies</option>
                    <option value="Android">Android Development</option>
                    <option value="Embedded">Embedded Systems</option>
                    <option value="VLSI">VLSI Design</option>
                </select>
            </div>

            <button type="submit" class="btn-submit">Publish Job Opportunity</button>
        </form>
    </div>

</body>
</html>
